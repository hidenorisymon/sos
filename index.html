      </button>
    </div>

      <div style="font-size:2.8rem;font-weight:700;color:#fff;margin-bottom:6px;">🧠 SymonOS</div>
      <div style="font-size:0.85rem;color:#888;margin-bottom:48px;">By Symon</div>
      <div style="font-size:2.5rem;margin-bottom:16px;">⏳</div>
      <div style="font-size:1.1rem;font-weight:600;color:#fff;margin-bottom:8px;">Waiting for approval</div>

  </div>

  <script>
if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
  window.SupabaseAuth = {
    _state: { user: { email: 'symon@preview' }, status: 'approved', session: { access_token: 'dev' } },
    signInWithGoogle: function() {},
    signOut: function() { location.reload(); },
    getSession: function() { return Promise.resolve({ user: { email: 'symon@preview' } }); },
    getStatus: function() { return Promise.resolve('approved'); },
    onAuthStateChange: function(cb) {
      setTimeout(function() { cb(window.SupabaseAuth._state); }, 50);
      return function() {};
    }
  };
}
</script>

  <script>
  (function () {
    function showSignin() {

      document.getElementById('auth-overlay').style.display = 'flex';
    }
    function showPending() {
      document.getElementById('auth-signin').style.display = 'none';
      document.getElementById('auth-pending').style.display = 'flex';
      document.getElementById('auth-overlay').style.display = 'flex';
    }
    function hideOverlay() {
      document.getElementById('auth-overlay').style.display = 'none';
    }

        showPending();
      });
    }
  })();
